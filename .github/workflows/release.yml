name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK with tag
        run: |
          TAG=${GITHUB_REF_NAME:-$(git describe --tags --always)}
          cp app/build/outputs/apk/debug/app-debug.apk "MiUnlocker-${TAG}.apk"
        shell: bash

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME:-$(git describe --tags --always)}
          gh release create "${TAG}" \
            --title "MiUnlocker ${TAG}" \
            --generate-notes \
            "MiUnlocker-${TAG}.apk"
        shell: bash
